services:
  postgres:
    image: postgres:16-alpine
    container_name: connectedos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: connectedos
      POSTGRES_PASSWORD: connectedos
      POSTGRES_DB: connectedos
    ports:
      - "5432:5432"
    volumes:
      - connectedos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectedos -d connectedos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  connectedos-postgres-data:
